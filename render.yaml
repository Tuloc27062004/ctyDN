services:
  - type: web
    name: newpot-backend
    source: ./newpot-hbny-be-main
    buildCommand: npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: newpot-db

  - type: web
    name: newpot-frontend
    source: ./newpot-hbny-main
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://newpot-backend.onrender.com

  - type: web
    name: admin-frontend
    source: ./admin-main
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://newpot-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase: admin-db

databases:
  - name: newpot-db
    databaseName: newpot
    user: newpot_user
    plan: starter
  - name: admin-db
    databaseName: admin
    user: admin_user
    plan: starter
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://newpot-backend.onrender.com
      - key: DATABASE_URL
        fromSecret: database_url